<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3D Sync Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid #e91e63; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #e91e63; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 8px; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #333; }
        .card h2 { color: #e91e63; margin-bottom: 12px; font-size: 1.1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-box { background: #0f0f23; padding: 16px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #e91e63; }
        .stat-label { color: #888; font-size: 0.8rem; margin-top: 4px; }
        .btn { background: linear-gradient(45deg, #e91e63, #9c27b0); color: white; border: none; padding: 14px 24px; border-radius: 10px; font-size: 1rem; cursor: pointer; width: 100%; margin-bottom: 8px; }
        .btn:disabled { opacity: 0.5; }
        .btn-secondary { background: #333; }
        .status { padding: 12px; border-radius: 8px; margin-top: 12px; display: none; font-size: 0.9rem; }
        .status.success { background: #1b5e20; display: block; }
        .status.error { background: #b71c1c; display: block; }
        .status.loading { background: #0d47a1; display: block; }
        .last-sync { color: #888; margin-top: 8px; font-size: 0.85rem; }
        .design-item { background: #0f0f23; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .design-name { font-weight: 500; font-size: 0.95rem; }
        .design-grams { color: #888; font-size: 0.8rem; }
        .design-source { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; text-transform: uppercase; }
        .source-n3d { background: #4caf50; }
        .source-fallback { background: #ff9800; }
        .source-custom { background: #e91e63; }
        .form-group { margin-bottom: 12px; }
        .form-group label { color: #888; font-size: 0.85rem; display: block; margin-bottom: 4px; }
        .form-group input { background: #0f0f23; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; width: 100%; font-size: 1rem; }
        .color-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .color-row input { flex: 1; }
        .color-row input[type="number"] { flex: 0.4; }
        .hidden { display: none !important; }
        #login-section { text-align: center; padding: 40px 20px; }
        .designs-list { max-height: 300px; overflow-y: auto; margin-top: 12px; }
        input[type="text"], input[type="number"] { -webkit-appearance: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎱 N3D Sync Admin</h1>
            <p class="subtitle">BlackPeacockPrinting</p>
        </header>

        <div id="login-section" class="card">
            <h2>Admin Login</h2>
            <p style="color: #888; margin: 12px 0; font-size: 0.9rem;">Sign in with Google to manage designs</p>
            <button class="btn" onclick="signIn()">Sign in with Google</button>
        </div>

        <div id="dashboard" class="hidden">
            <div class="card">
                <h2>📊 Sync Status</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number" id="stat-total">-</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="stat-n3d">-</div>
                        <div class="stat-label">N3D API</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="stat-fallback">-</div>
                        <div class="stat-label">Fallback</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="stat-custom">-</div>
                        <div class="stat-label">Custom</div>
                    </div>
                </div>
                <div class="last-sync" id="last-sync">Never synced</div>
                <button class="btn" id="sync-btn" onclick="sync()">🔄 Sync with N3D</button>
                <button class="btn btn-secondary" onclick="loadDesigns()">📝 View Designs</button>
                <div id="sync-status" class="status"></div>
            </div>

            <div class="card">
                <h2>➕ Add Custom Design</h2>
                <div class="form-group">
                    <label>Pokémon Name</label>
                    <input type="text" id="custom-name" placeholder="e.g., Shadow Mewtwo">
                </div>
                <div class="form-group">
                    <label>Colors & Grams</label>
                    <div id="color-inputs">
                        <div class="color-row">
                            <input type="text" placeholder="Color" class="color-name">
                            <input type="number" placeholder="g" class="color-grams">
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="addColor()" style="margin-top: 8px;">+ Add Color</button>
                </div>
                <button class="btn" onclick="saveCustom()">💾 Save Design</button>
            </div>

            <div class="card">
                <h2>📋 All Designs</h2>
                <input type="text" id="search" placeholder="Search..." oninput="filter(this.value)" style="width: 100%; padding: 12px; background: #0f0f23; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 12px;">
                <div class="designs-list" id="designs-list"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
            authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
            projectId: "blackpeacockprinting-fbb65",
            storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
            messagingSenderId: "1025287520257",
            appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let allDesigns = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadStats();
            }
        });

        function signIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        async function loadStats() {
            const snap = await db.collection('n3dDesigns').get();
            const stats = { total: 0, n3d: 0, fallback: 0, custom: 0 };
            snap.forEach(doc => {
                stats.total++;
                stats[doc.data().source === 'n3d_api' ? 'n3d' : doc.data().source === 'fallback' ? 'fallback' : 'custom']++;
            });
            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-n3d').textContent = stats.n3d;
            document.getElementById('stat-fallback').textContent = stats.fallback;
            document.getElementById('stat-custom').textContent = stats.custom;
            
            const meta = await db.collection('syncMetadata').doc('n3d').get();
            if (meta.exists && meta.data().lastSync) {
                document.getElementById('last-sync').textContent = 'Last: ' + meta.data().lastSync.toDate().toLocaleDateString();
            }
        }

        async function sync() {
            const btn = document.getElementById('sync-btn');
            const status = document.getElementById('sync-status');
            btn.disabled = true;
            status.className = 'status loading';
            status.textContent = 'Fetching from N3D...';
            
            try {
                const res = await fetch('https://www.n3dmelbourne.com/api/v1/designs', {
                    headers: { 'Authorization': 'Bearer n3d_sk_N49oAN4-H4bniv08z3-Y7D5UZl_W0DcR' }
                });
                const data = await res.json();
                const designs = data.data || [];
                
                status.textContent = 'Saving ' + designs.length + ' designs...';
                
                const batch = db.batch();
                for (const d of designs) {
                    const breakdown = [];
                    if (d.colors) d.colors.forEach(c => breakdown.push({ color: c.name || 'Unknown', grams: c.grams || 0 }));
                    if (breakdown.length === 0 && d.weight_grams) breakdown.push({ color: 'Ivory White', grams: d.weight_grams });
                    
                    const ref = db.collection('n3dDesigns').doc(d.name);
                    const existing = await ref.get();
                    if (!existing.exists || existing.data().source !== 'custom') {
                        batch.set(ref, {
                            name: d.name,
                            totalGrams: breakdown.reduce((s, p) => s + p.grams, 0) || d.weight_grams || 50,
                            filamentBreakdown: breakdown,
                            source: 'n3d_api',
                            lastSynced: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                }
                await batch.commit();
                
                await db.collection('syncMetadata').doc('n3d').set({
                    lastSync: firebase.firestore.FieldValue.serverTimestamp(),
                    designsCount: designs.length
                });
                
                status.className = 'status success';
                status.textContent = '✅ Synced ' + designs.length + ' designs!';
                loadStats();
            } catch (e) {
                status.className = 'status error';
                status.textContent = '❌ Error: ' + e.message;
            }
            btn.disabled = false;
        }

        async function loadDesigns() {
            const list = document.getElementById('designs-list');
            list.innerHTML = 'Loading...';
            const snap = await db.collection('n3dDesigns').orderBy('name').get();
            allDesigns = [];
            snap.forEach(doc => allDesigns.push({ id: doc.id, ...doc.data() }));
            render(allDesigns);
        }

        function render(designs) {
            const list = document.getElementById('designs-list');
            list.innerHTML = designs.map(d => `
                <div class="design-item">
                    <div>
                        <div class="design-name">${d.name}</div>
                        <div class="design-grams">${d.totalGrams}g · ${d.filamentBreakdown.length} colors</div>
                    </div>
                    <span class="design-source source-${d.source}">${d.source}</span>
                </div>
            `).join('');
        }

        function filter(term) {
            render(allDesigns.filter(d => d.name.toLowerCase().includes(term.toLowerCase())));
        }

        function addColor() {
            const div = document.createElement('div');
            div.className = 'color-row';
            div.innerHTML = '<input type="text" placeholder="Color" class="color-name"><input type="number" placeholder="g" class="color-grams">';
            document.getElementById('color-inputs').appendChild(div);
        }

        async function saveCustom() {
            const name = document.getElementById('custom-name').value.trim();
            if (!name) return alert('Enter name');
            
            const breakdown = [];
            document.querySelectorAll('.color-row').forEach(row => {
                const c = row.querySelector('.color-name').value.trim();
                const g = parseInt(row.querySelector('.color-grams').value);
                if (c && g) breakdown.push({ color: c, grams: g });
            });
            
            if (breakdown.length === 0) return alert('Add colors');
            
            await db.collection('n3dDesigns').doc(name).set({
                name: name,
                totalGrams: breakdown.reduce((s, p) => s + p.grams, 0),
                filamentBreakdown: breakdown,
                source: 'custom',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            alert('✅ Saved!');
            document.getElementById('custom-name').value = '';
            document.getElementById('color-inputs').innerHTML = '<div class="color-row"><input type="text" placeholder="Color" class="color-name"><input type="number" placeholder="g" class="color-grams"></div>';
            loadStats();
            loadDesigns();
        }
    </script>
</body>
</html>
