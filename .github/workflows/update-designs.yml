name: Update Designs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch designs from N3D
        run: |
          curl "https://www.n3dmelbourne.com/api/v1/designs?category=character&limit=200&include=details&locale=KR" \
            -H "Authorization: Bearer ${{ secrets.N3D_API_KEY }}" \
            -o designs.json

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add designs.json
          git diff --staged --quiet || git commit -m "Auto-update designs"
          git push
