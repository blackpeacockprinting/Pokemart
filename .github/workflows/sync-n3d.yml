name: Sync N3D Designs to Order Tracker

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at 12:00 AM UTC = 9:00 AM KST
  workflow_dispatch:  # Allows manual run

jobs:
  sync-n3d:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Fetch N3D designs
      env:
        N3D_API_KEY: ${{ secrets.N3D_API_KEY }}
      run: |
        python << 'EOF'
        import requests
        import json
        import os
        import time
        
        API_KEY = os.environ['N3D_API_KEY']
        headers = {'Authorization': f'Bearer {API_KEY}'}
        
        all_designs = []
        page = 1
        limit = 200  # Max allowed by API
        
        # Fetch all pages of designs with full details
        while True:
            print(f"Fetching page {page}...")
            response = requests.get(
                f'https://www.n3dmelbourne.com/api/v1/designs?limit={limit}&page={page}&include=details',
                headers=headers
            )
            
            if response.status_code != 200:
                print(f"Error: {response.status_code}")
                print(response.text)
                break
            
            data = response.json()
            designs = data.get('data', [])
            pagination = data.get('pagination', {})
            
            all_designs.extend(designs)
            print(f"Got {len(designs)} designs (total: {len(all_designs)})")
            
            # Check if there are more pages
            if not pagination.get('has_next', False):
                break
            
            page += 1
            time.sleep(0.5)  # Be nice to the API
        
        # Save to data directory
        os.makedirs('data', exist_ok=True)
        with open('data/n3d-designs.json', 'w') as f:
            json.dump(all_designs, f, indent=2)
        
        print(f"Synced {len(all_designs)} total designs")
        EOF
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/n3d-designs.json
        git diff --staged --quiet || git commit -m "Update N3D designs - $(date +'%Y-%m-%d %H:%M')"
        git push
