name: Sync N3D Designs Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-n3d-designs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Create sync script
      run: |
        cat > sync-n3d.js << 'EOF'
        const https = require('https');
        const fs = require('fs');
        const path = require('path');

        const API_KEY = process.env.N3D_API_KEY;
        const OUTPUT_FILE = path.join(__dirname, 'data', 'n3d-designs.json');

        async function fetchN3DDesigns() {
          return new Promise((resolve, reject) => {
            const options = {
              hostname: 'www.n3dmelbourne.com',
              path: '/api/v1/designs?limit=200&include=details',
              method: 'GET',
              headers: {
                'Authorization': `Bearer ${API_KEY}`,
                'Content-Type': 'application/json'
              }
            };

            const req = https.request(options, (res) => {
              let data = '';
              res.on('data', (chunk) => data += chunk);
              res.on('end', () => {
                try {
                  const response = JSON.parse(data);
                  if (response.error) {
                    reject(new Error(response.error));
                  } else {
                    resolve(response.data || response);
                  }
                } catch (e) {
                  reject(new Error('Failed to parse response: ' + e.message));
                }
              });
            });

            req.on('error', reject);
            req.end();
          });
        }

        async function main() {
          try {
            console.log('Fetching N3D designs...');
            const designs = await fetchN3DDesigns();
            
            const dataDir = path.dirname(OUTPUT_FILE);
            if (!fs.existsSync(dataDir)) {
              fs.mkdirSync(dataDir, { recursive: true });
            }
            
            const output = {
              lastUpdated: new Date().toISOString(),
              designs: designs
            };
            
            fs.writeFileSync(OUTPUT_FILE, JSON.stringify(output, null, 2));
            console.log(`✅ Synced ${designs.length} designs to ${OUTPUT_FILE}`);
            
            const categories = {};
            designs.forEach(d => {
              const cat = d.category || 'uncategorized';
              categories[cat] = (categories[cat] || 0) + 1;
            });
            console.log('\nDesigns by category:');
            Object.entries(categories).forEach(([cat, count]) => {
              console.log(`  ${cat}: ${count}`);
            });
            
          } catch (error) {
            console.error('❌ Sync failed:', error.message);
            process.exit(1);
          }
        }

        main();
        EOF
        
    - name: Run sync script
      env:
        N3D_API_KEY: ${{ secrets.N3D_API_KEY }}
      run: node sync-n3d.js
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/n3d-designs.json
        git diff --staged --quiet || (git commit -m "🔄 Auto-sync N3D designs - $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
