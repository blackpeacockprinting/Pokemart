name: Sync N3D Designs to Order Tracker

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at 12:00 AM UTC = 9:00 AM KST
  workflow_dispatch:  # Allows manual run

jobs:
  sync-n3d:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Fetch N3D designs
      env:
        N3D_API_KEY: ${{ secrets.N3D_API_KEY }}
      run: |
        python << 'EOF'
        import requests
        import json
        import os
        
        API_KEY = os.environ['N3D_API_KEY']
        headers = {'Authorization': f'Bearer {API_KEY}'}
        
        # Fetch all designs from N3D
        response = requests.get('https://api.n3d.io/v1/designs', headers=headers)
        designs = response.json()
        
        # Save to data directory
        with open('data/n3d-designs.json', 'w') as f:
            json.dump(designs, f, indent=2)
        
        print(f"Synced {len(designs)} designs")
        EOF
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/n3d-designs.json
        git diff --staged --quiet || git commit -m "Update N3D designs - $(date +'%Y-%m-%d %H:%M')"
        git push
