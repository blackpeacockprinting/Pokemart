<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké Mart - Custom 3D Printed Pokéballs</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --pokedex-red: #DC0A2D;
            --pokedex-dark-red: #B30824;
            --screen-bg: #232323;
            --screen-border: #1a1a1a;
            --digital-green: #39FF14;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-gold: #FFD700;
            --btn-team: #FFCC00;
            --btn-search: #30A7D7;
            --btn-cart: #4CAF50;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
        }
        
        /* Loading Screen */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--pokedex-red);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-pokeball {
            width: 100px;
            height: 100px;
            position: relative;
            animation: shake 0.8s ease-in-out infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(-8deg); }
            25% { transform: rotate(8deg); }
            50% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }
        
        .loader-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 48%;
            background: linear-gradient(180deg, #ff4444 0%, #cc0000 100%);
            border-radius: 100px 100px 0 0;
            border: 4px solid #000;
            border-bottom: none;
            transform-origin: bottom center;
            transition: transform 0.5s ease;
        }
        
        .loader-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48%;
            background: linear-gradient(180deg, #fff 0%, #ddd 100%);
            border-radius: 0 0 100px 100px;
            border: 4px solid #000;
            border-top: none;
        }
        
        .loader-button {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border: 4px solid #000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        .loader-button::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .loader.open .loader-top {
            transform: rotateX(-120deg);
        }
        
        .loader.open .loader-pokeball {
            animation: none;
        }
        
        .loader-text {
            margin-top: 30px;
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* Desktop: Full width layout */
        @media (min-width: 769px) {
            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                overflow-y: auto;
            }
            
            .pokedex-frame {
                display: none;
            }
            
            .desktop-container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 20px;
            }
            
            .desktop-header {
                text-align: center;
                padding: 30px 0;
            }
            
            .desktop-logo {
                width: 80px;
                height: 80px;
                margin: 0 auto 15px;
            }
            
            .desktop-title {
                font-family: 'Exo 2', sans-serif;
                font-size: 3rem;
                font-weight: 800;
                color: var(--pokedex-red);
                text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            }
            
            .desktop-actions {
                position: fixed;
                bottom: 20px;
                right: 20px;
                display: flex;
                gap: 15px;
                z-index: 1000;
            }
            
            .desktop-action-btn {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                border: none;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(0,0,0,0.4);
                transition: transform 0.2s;
                font-family: 'Rajdhani', sans-serif;
                font-size: 0.75rem;
            }
            
            .desktop-action-btn:hover {
                transform: scale(1.1);
            }
            
            .desktop-action-btn.team { background: var(--btn-team); color: #000; }
            .desktop-action-btn.search { background: var(--btn-search); color: #fff; }
            .desktop-action-btn.cart { background: var(--btn-cart); color: #fff; }
            
            .desktop-action-btn .icon {
                font-size: 1.5rem;
                margin-bottom: 2px;
            }
            
            .cart-badge {
                position: absolute;
                top: -5px;
                right: -5px;
                background: #ff0000;
                color: white;
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Exo 2', sans-serif;
                font-size: 0.75rem;
                font-weight: 700;
            }
        }
        
        /* Mobile: Pokédex Frame */
        @media (max-width: 768px) {
            .desktop-container { display: none; }
            
            .pokedex-frame {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--pokedex-red);
                display: flex;
                flex-direction: column;
                padding: 15px;
                z-index: 1;
            }
            
            /* Pokédex top section */
            .pokedex-top {
                display: flex;
                align-items: center;
                gap: 15px;
                padding: 10px 15px;
                background: linear-gradient(180deg, var(--pokedex-red) 0%, var(--pokedex-dark-red) 100%);
                border-radius: 15px 15px 0 0;
            }
            
            .pokedex-light {
                width: 50px;
                height: 50px;
                background: radial-gradient(circle at 30% 30%, #4fc3f7, #0288d1);
                border-radius: 50%;
                border: 3px solid #333;
                box-shadow: 0 0 20px rgba(79, 195, 247, 0.5), inset -5px -5px 10px rgba(0,0,0,0.3);
                position: relative;
            }
            
            .pokedex-light::after {
                content: '';
                position: absolute;
                top: 10px;
                left: 12px;
                width: 15px;
                height: 10px;
                background: rgba(255,255,255,0.6);
                border-radius: 50%;
                transform: rotate(-45deg);
            }
            
            .pokedex-small-lights {
                display: flex;
                gap: 8px;
            }
            
            .pokedex-small-light {
                width: 15px;
                height: 15px;
                border-radius: 50%;
                border: 2px solid #333;
            }
            
            .pokedex-small-light.red { background: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.5); }
            .pokedex-small-light.yellow { background: #ffeb3b; box-shadow: 0 0 10px rgba(255,235,59,0.5); }
            .pokedex-small-light.green { background: #4caf50; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
            
            /* Pokédex screen area */
            .pokedex-screen-border {
                flex: 1;
                background: #ddd;
                border-radius: 15px;
                padding: 20px;
                margin: 10px 0;
                box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            }
            
            .pokedex-screen {
                height: 100%;
                background: var(--screen-bg);
                border-radius: 10px;
                overflow-y: auto;
                position: relative;
                -webkit-overflow-scrolling: touch;
            }
            
            /* Screen content */
            .screen-content {
                padding: 15px;
                min-height: 100%;
            }
            
            .screen-header {
                text-align: center;
                padding: 15px 0;
                border-bottom: 2px solid var(--pokedex-red);
                margin-bottom: 15px;
            }
            
            .screen-title {
                font-family: 'Exo 2', sans-serif;
                font-size: 1.5rem;
                font-weight: 800;
                color: var(--pokedex-red);
                text-shadow: 0 0 10px rgba(220, 10, 45, 0.5);
            }
            
            .screen-subtitle {
                font-family: 'Rajdhani', sans-serif;
                font-size: 0.85rem;
                font-weight: 600;
                color: var(--digital-green);
                margin-top: 5px;
                letter-spacing: 1px;
            }
            
            /* Search */
            .search-container {
                margin-bottom: 15px;
            }
            
            .search-input {
                width: 100%;
                padding: 12px 15px;
                background: rgba(255,255,255,0.1);
                border: 2px solid rgba(57, 255, 20, 0.3);
                border-radius: 25px;
                color: var(--text-primary);
                font-family: 'Rajdhani', sans-serif;
                font-size: 1rem;
            }
            
            .search-input:focus {
                outline: none;
                border-color: var(--digital-green);
            }
            
            .search-input::placeholder {
                color: var(--text-secondary);
            }
            
            /* Type filters */
            .type-filters {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
                margin-bottom: 15px;
                justify-content: center;
            }
            
            .type-btn {
                padding: 5px 10px;
                border: none;
                border-radius: 12px;
                font-family: 'Rajdhani', sans-serif;
                font-weight: 600;
                font-size: 0.65rem;
                text-transform: uppercase;
                cursor: pointer;
                opacity: 0.8;
            }
            
            .type-btn.active { opacity: 1; box-shadow: 0 0 10px currentColor; }
            
            .type-fire { background: #f08030; color: white; }
            .type-water { background: #6890f0; color: white; }
            .type-electric { background: #f8d030; color: black; }
            .type-grass { background: #78c850; color: white; }
            .type-ice { background: #98d8d8; color: black; }
            .type-fighting { background: #c03028; color: white; }
            .type-poison { background: #a040a0; color: white; }
            .type-ground { background: #e0c068; color: black; }
            .type-flying { background: #a890f0; color: white; }
            .type-psychic { background: #f85888; color: white; }
            .type-bug { background: #a8b820; color: white; }
            .type-rock { background: #b8a038; color: white; }
            .type-ghost { background: #705898; color: white; }
            .type-dragon { background: #7038f8; color: white; }
            .type-dark { background: #705848; color: white; }
            .type-steel { background: #b8b8d0; color: black; }
            .type-fairy { background: #ee99ac; color: black; }
            .type-normal { background: #a8a878; color: white; }
            
            /* Product grid */
            .product-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            /* Product card */
            .product-card {
                background: rgba(255,255,255,0.05);
                border-radius: 12px;
                overflow: hidden;
                position: relative;
                border: 2px solid transparent;
                transition: all 0.2s;
            }
            
            .product-card:active {
                transform: scale(0.98);
            }
            
            .product-card.in-cart {
                border-color: var(--digital-green);
                box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            }
            
            .card-image {
                height: 120px;
                background: linear-gradient(135deg, rgba(220, 10, 45, 0.2) 0%, rgba(0,0,0,0.3) 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                position: relative;
            }
            
            .card-image img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            
            .pokeball-placeholder {
                width: 70px;
                height: 70px;
                position: relative;
            }
            
            .pokeball-placeholder::before {
                content: '';
                position: absolute;
                width: 100%;
                height: 48%;
                background: transparent;
                border: 3px solid rgba(255,255,255,0.5);
                border-radius: 70px 70px 0 0;
                border-bottom: none;
                top: 0;
            }
            
            .pokeball-placeholder::after {
                content: '';
                position: absolute;
                width: 100%;
                height: 48%;
                background: transparent;
                border: 3px solid rgba(255,255,255,0.5);
                border-radius: 0 0 70px 70px;
                border-top: none;
                bottom: 0;
            }
            
            .pokeball-button {
                position: absolute;
                width: 20px;
                height: 20px;
                background: var(--screen-bg);
                border: 3px solid rgba(255,255,255,0.5);
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 10;
            }
            
            .card-type-badges {
                position: absolute;
                top: 5px;
                right: 5px;
                display: flex;
                gap: 3px;
            }
            
            .card-type-badge {
                padding: 2px 6px;
                border-radius: 8px;
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
            }
            
            .card-info {
                padding: 10px;
            }
            
            .card-name {
                font-family: 'Exo 2', sans-serif;
                font-size: 0.9rem;
                font-weight: 700;
                text-transform: capitalize;
                margin-bottom: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .card-price {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--text-gold);
                margin-bottom: 8px;
            }
            
            .card-actions {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            
            .qty-btn {
                width: 28px;
                height: 28px;
                background: rgba(255,255,255,0.1);
                border: 1px solid rgba(255,255,255,0.2);
                border-radius: 6px;
                color: var(--text-primary);
                font-size: 1rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .qty-btn:active {
                background: var(--pokedex-red);
            }
            
            .qty-display {
                flex: 1;
                text-align: center;
                font-weight: 700;
                font-size: 1rem;
            }
            
            .team-btn {
                width: 28px;
                height: 28px;
                background: transparent;
                border: 1px solid rgba(255,255,255,0.2);
                border-radius: 6px;
                color: var(--text-secondary);
                font-size: 0.9rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .team-btn.in-team {
                background: var(--btn-team);
                color: #000;
                border-color: var(--btn-team);
            }
            
            /* Bottom action buttons */
            .pokedex-bottom {
                display: flex;
                justify-content: center;
                gap: 30px;
                padding: 15px;
                background: linear-gradient(180deg, var(--pokedex-dark-red) 0%, var(--pokedex-red) 100%);
                border-radius: 0 0 15px 15px;
            }
            
            .action-btn {
                width: 65px;
                height: 65px;
                border-radius: 50%;
                border: 3px solid rgba(0,0,0,0.3);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                position: relative;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 -5px 10px rgba(0,0,0,0.2);
                transition: transform 0.1s;
            }
            
            .action-btn:active {
                transform: scale(0.95);
            }
            
            .action-btn.team { background: var(--btn-team); }
            .action-btn.search { background: var(--btn-search); }
            .action-btn.cart { background: var(--btn-cart); }
            
            .action-btn .icon {
                font-size: 1.5rem;
                margin-bottom: 2px;
            }
            
            .action-btn .label {
                font-family: 'Rajdhani', sans-serif;
                font-size: 0.8rem;
                font-weight: 700;
                color: #000;
            }
            
            .action-btn.cart .label {
                color: #fff;
            }
            
            .btn-badge {
                position: absolute;
                top: -5px;
                right: -5px;
                background: #ff0000;
                color: white;
                min-width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Exo 2', sans-serif;
                font-size: 0.8rem;
                font-weight: 700;
                border: 2px solid #333;
            }
            
            /* Panels */
            .panel {
                display: none;
                position: fixed;
                bottom: 100px;
                left: 15px;
                right: 15px;
                background: var(--screen-bg);
                border: 3px solid var(--pokedex-red);
                border-radius: 15px;
                padding: 15px;
                z-index: 100;
                max-height: 60vh;
                overflow-y: auto;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            }
            
            .panel.active {
                display: block;
            }
            
            .panel-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
                padding-bottom: 10px;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            
            .panel-title {
                font-family: 'Exo 2', sans-serif;
                font-size: 1.1rem;
                font-weight: 700;
            }
            
            .panel-close {
                background: none;
                border: none;
                color: var(--text-secondary);
                font-size: 1.5rem;
                cursor: pointer;
            }
            
            /* Team panel */
            .team-slots {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-bottom: 15px;
            }
            
            .team-slot {
                aspect-ratio: 1;
                background: rgba(255,255,255,0.05);
                border: 2px dashed rgba(255,255,255,0.2);
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: relative;
            }
            
            .team-slot.filled {
                border-style: solid;
                border-color: var(--btn-team);
                background: rgba(255, 204, 0, 0.1);
            }
            
            .team-slot-number {
                position: absolute;
                top: 5px;
                left: 5px;
                font-family: 'Rajdhani', sans-serif;
                font-size: 0.75rem;
                font-weight: 600;
                color: rgba(255,255,255,0.5);
            }
            
            .team-slot-name {
                font-size: 0.8rem;
                font-weight: 600;
                text-align: center;
                padding: 2px;
            }
            
            .team-slot-remove {
                position: absolute;
                top: -8px;
                right: -8px;
                width: 20px;
                height: 20px;
                background: var(--pokedex-red);
                border: none;
                border-radius: 50%;
                color: white;
                font-size: 0.8rem;
                cursor: pointer;
            }
            
            .team-bonus {
                text-align: center;
                padding: 10px;
                background: rgba(255, 204, 0, 0.2);
                border: 1px solid var(--btn-team);
                border-radius: 10px;
            }
            
            .team-bonus-text {
                font-family: 'Exo 2', sans-serif;
                font-size: 0.9rem;
                font-weight: 700;
                color: var(--btn-team);
            }
            
            /* Cart panel */
            .cart-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 0;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            
            .cart-item-name {
                font-weight: 600;
                font-size: 0.9rem;
            }
            
            .cart-item-qty {
                color: var(--text-secondary);
                font-size: 0.75rem;
            }
            
            .cart-item-price {
                color: var(--text-gold);
                font-weight: 700;
            }
            
            .cart-total {
                display: flex;
                justify-content: space-between;
                padding: 15px 0;
                border-top: 2px solid var(--pokedex-red);
                margin-top: 10px;
                font-size: 1.2rem;
                font-weight: 700;
            }
            
            .cart-total-amount {
                color: var(--text-gold);
            }
            
            .checkout-btn {
                width: 100%;
                padding: 15px;
                background: var(--pokedex-red);
                border: none;
                border-radius: 10px;
                color: white;
                font-family: 'Exo 2', sans-serif;
                font-weight: 700;
                font-size: 1rem;
                cursor: pointer;
                margin-top: 10px;
            }
            
            .cart-empty {
                text-align: center;
                padding: 30px;
                color: var(--text-secondary);
            }
            
            /* Image lightbox */
            .lightbox {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.95);
                z-index: 1000;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }
            
            .lightbox.active {
                display: flex;
            }
            
            .lightbox-content {
                max-width: 90%;
                max-height: 80%;
                text-align: center;
            }
            
            .lightbox img {
                max-width: 100%;
                max-height: 70vh;
                border-radius: 10px;
            }
            
            .lightbox-name {
                font-family: 'Exo 2', sans-serif;
                font-size: 1.5rem;
                margin-top: 15px;
            }
            
            .lightbox-close {
                position: absolute;
                top: 20px;
                right: 20px;
                background: none;
                border: none;
                color: white;
                font-size: 2rem;
                cursor: pointer;
            }
            
            /* Modal overlay */
            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 50;
            }
            
            .overlay.active {
                display: block;
            }
            
            /* Checkout modal */
            .checkout-modal {
                display: none;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: var(--screen-bg);
                border: 3px solid var(--digital-green);

            }
            
            const imageHtml = imageUrl 
                ? `<img src="${imageUrl}" alt="${name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'pokeball-placeholder\\'><div class=\\'pokeball-button\\'></div></div>';" onclick="openLightbox('${imageUrl}', '${name}')">`
                : `<div class="pokeball-placeholder"><div class="pokeball-button"></div></div>`;
            
            return `
                <div class="product-card ${qty > 0 ? 'in-cart' : ''}" data-name="${name}" data-type="${primaryType}">
                    <div class="card-image">
                        ${typeBadges}
                        ${imageHtml}
                    </div>
                    <div class="card-info">
                        <div class="card-name">${name}</div>
                        <div class="card-price">$${price}.00</div>
                        <div class="card-actions">
                            <button class="qty-btn" onclick="updateQty('${name}', -1, ${price})">−</button>
                            <span class="qty-display" id="qty-${name.replace(/\s+/g, '-')}">${qty}</span>
                            <button class="qty-btn" onclick="updateQty('${name}', 1, ${price})">+</button>
                            <button class="team-btn ${inTeam ? 'in-team' : ''}" onclick="toggleTeam('${name}')" title="Add to Team">⭐</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderBundles() {
            const container = document.getElementById('bundleGrid');
            if (!container) return;
            
            container.innerHTML = Object.entries(CONFIG.bundles).map(([name, data]) => {
                const regularPrice = data.items.reduce((sum, item) => {
                    const cat = findCategory(item);
                    return sum + (CONFIG.pricing[cat] || 8);
                }, 0);
                const savings = regularPrice - data.price;
                
                return `
                    <div class="bundle-card" onclick="addBundle('${name}')">
                        ${savings > 0 ? `<span class="bundle-savings">Save $${savings}</span>` : ''}
                        <div class="bundle-name">${name}</div>
                        <div class="bundle-items">${data.items.join(', ')}</div>
                        <div class="bundle-price">
                            $${data.price}
                            ${regularPrice > data.price ? `<span class="bundle-original">$${regularPrice}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Quantity & Cart
        function updateQty(name, change, price) {
            const currentQty = cart[name]?.quantity || 0;
            const newQty = Math.max(0, currentQty + change);
            
            if (newQty === 0) {
                delete cart[name];
            } else {
                cart[name] = { quantity: newQty, price };
            }
            
            // Update display
            const qtyDisplay = document.getElementById(`qty-${name.replace(/\s+/g, '-')}`);
            if (qtyDisplay) qtyDisplay.textContent = newQty;
            
            // Update card styling
            const card = document.querySelector(`[data-name="${name}"]`);
            if (card) card.classList.toggle('in-cart', newQty > 0);
            
            updateCartDisplay();
        }
        
        function addMysteryToCart() {
            const key = 'Mystery Pokéball';
            if (cart[key]) {
                cart[key].quantity += 1;
            } else {
                cart[key] = { quantity: 1, price: CONFIG.pricing.mystery };
            }
            updateCartDisplay();
            
            const btn = event.target;
            btn.textContent = 'Added!';
            setTimeout(() => btn.textContent = 'Add Mystery Ball', 1500);
        }
        
        function addBundle(bundleName) {
            const bundle = CONFIG.bundles[bundleName];
            const pricePerItem = Math.round(bundle.price / bundle.items.length);
            
            bundle.items.forEach(item => {
                cart[item] = { quantity: 1, price: pricePerItem, isBundle: true };
            });
            
            updateCartDisplay();
            alert(`Added ${bundleName} to cart!`);
        }
        
        function updateCartDisplay() {
            const count = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
            const total = Object.values(cart).reduce((sum, item) => sum + (item.quantity * item.price), 0);
            
            // Update badges
            const cartBadge = document.getElementById('cartBadge');
            const desktopCartCount = document.getElementById('desktopCartCount');
            
            if (cartBadge) {
                cartBadge.textContent = count;
                cartBadge.style.display = count > 0 ? 'flex' : 'none';
            }
            if (desktopCartCount) desktopCartCount.textContent = count;
            
            document.getElementById('cartTotal').textContent = total.toFixed(2);
            
            // Update cart panel
            const cartItems = document.getElementById('cartItems');
            if (count === 0) {
                cartItems.innerHTML = '<div class="cart-empty">🛒<br>Your cart is empty</div>';
            } else {
                cartItems.innerHTML = Object.entries(cart).map(([name, item]) => `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-name">${name}</div>
                            <div class="cart-item-qty">Qty: ${item.quantity}</div>
                        </div>
                        <div class="cart-item-price">$${(item.quantity * item.price).toFixed(2)}</div>
                    </div>
                `).join('');
            }
        }
        
        // Team Builder
        function initTeamSlots() {
            const container = document.getElementById('teamSlots');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const slot = document.createElement('div');
                slot.className = 'team-slot';
                slot.dataset.index = i;
                slot.innerHTML = `<span class="team-slot-number">${i + 1}</span>`;
                container.appendChild(slot);
            }
        }
        
        function toggleTeam(name) {
            const index = team.indexOf(name);
            
            if (index > -1) {
                team.splice(index, 1);
            } else {
                if (team.length >= 6) {
                    alert('Team is full! Remove a Pokemon first.');
                    return;
                }
                team.push(name);
            }
            
            updateTeamDisplay();
            renderProducts(); // Re-render to update star buttons
        }
        
        function updateTeamDisplay() {
            const slots = document.querySelectorAll('.team-slot');
            slots.forEach((slot, i) => {
                if (team[i]) {
                    slot.classList.add('filled');
                    slot.innerHTML = `
                        <span class="team-slot-number">${i + 1}</span>
                        <button class="team-slot-remove" onclick="removeFromTeam(${i})">×</button>
                        <div class="team-slot-name">${team[i]}</div>
                    `;
                } else {
                    slot.classList.remove('filled');
                    slot.innerHTML = `<span class="team-slot-number">${i + 1}</span>`;
                }
            });
            
            // Update team count
            const teamBtnLabel = document.getElementById('teamBtnLabel');
            const desktopTeamCount = document.getElementById('desktopTeamCount');
            
            if (teamBtnLabel) teamBtnLabel.textContent = `${team.length}/6`;
            if (desktopTeamCount) desktopTeamCount.textContent = `${team.length}/6`;
            
            // Show/hide bonus
            const teamBonus = document.getElementById('teamBonus');
            if (teamBonus) {
                teamBonus.style.display = team.length === 6 ? 'block' : 'none';
            }
            
            // Apply team discount
            if (team.length === 6) {
                team.forEach(name => {
                    const cat = findCategory(name);
                    const basePrice = CONFIG.pricing[cat] || 8;
                    const discountPrice = Math.round(basePrice * (1 - CONFIG.pricing.teamDiscount));
                    if (!cart[name] || !cart[name].isTeam) {
                        cart[name] = { quantity: 1, price: discountPrice, isTeam: true };
                    }
                });
                updateCartDisplay();
            }
        }
        
        function removeFromTeam(index) {
            team.splice(index, 1);
            updateTeamDisplay();
            renderProducts();
        }
        
        // Lightbox
        function openLightbox(url, name) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const nameEl = document.getElementById('lightboxName');
            
            img.src = url;
            nameEl.textContent = name;
            lightbox.classList.add('active');
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        
        // Panels
        function toggleTeamPanel() {
            const panel = document.getElementById('teamPanel');
            const overlay = document.getElementById('overlay');
            const isOpen = panel.classList.contains('active');
            
            closeAllPanels();
            
            if (!isOpen) {
                panel.classList.add('active');
                overlay.classList.add('active');
            }
        }
        
        function toggleCartPanel() {
            const panel = document.getElementById('cartPanel');
            const overlay = document.getElementById('overlay');
            const isOpen = panel.classList.contains('active');
            
            closeAllPanels();
            
            if (!isOpen) {
                panel.classList.add('active');
                overlay.classList.add('active');
            }
        }
        
        function focusSearch() {
            const searchInput = isMobile ? document.getElementById('searchInput') : document.getElementById('desktopSearch');
            if (searchInput) {
                searchInput.focus();
                searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        function closeAllPanels() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('overlay').classList.remove('active');
        }
        
        // Filters
        function filterByType(type) {
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === type) btn.classList.add('active');
            });
            
            currentTypeFilter = currentTypeFilter === type ? 'all' : type;
            if (currentTypeFilter === 'all') {
                document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            }
            
            applyFilters();
        }
        
        function filterPokemon() {
            applyFilters();
        }
        
        function applyFilters() {
            const searchInput = isMobile ? document.getElementById('searchInput') : document.getElementById('desktopSearch');
            const search = searchInput?.value.toLowerCase() || '';
            
            document.querySelectorAll('.product-card').forEach(card => {
                const name = card.dataset.name.toLowerCase();
                const type = card.dataset.type;
                
                const matchesSearch = name.includes(search);
                const matchesType = currentTypeFilter === 'all' || type === currentTypeFilter;
                
                card.style.display = (matchesSearch && matchesType) ? 'block' : 'none';
            });
        }
        
        // Checkout
        function openCheckout() {
            if (Object.keys(cart).length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            const total = Object.values(cart).reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const details = Object.entries(cart).map(([name, item]) => 
                `${name} x${item.quantity} ($${item.price} each)`
            ).join('\n');
            
            document.getElementById('orderDetails').value = details;
            document.getElementById('orderTotal').value = `$${total.toFixed(2)}`;
            
            document.getElementById('checkoutModal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }
        
        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        
        function submitOrder() {
            document.getElementById('successMessage').classList.add('active');
            
            setTimeout(() => {
                cart = {};
                team = [];
                updateCartDisplay();
                updateTeamDisplay();
                renderProducts();
                closeCheckout();
                closeAllPanels();
            }, 1000);
            
            setTimeout(() => {
                document.getElementById('successMessage').classList.remove('active');
            }, 3000);
            
            return true;
        }
        
        // Helpers
        function findCategory(name) {
            for (let cat in CONFIG.pokemon) {
                if (CONFIG.pokemon[cat].includes(name)) return cat;
            }
            return 'standard';
        }
        
        function loadCartFromURL() {
            const params = new URLSearchParams(window.location.search);
            const cartData = params.get('cart');
            if (cartData) {
                try {
                    cart = JSON.parse(atob(cartData));
                    updateCartDisplay();
                } catch(e) {}
            }
        }
        
        // Share functions
        function shareCart() {
            const cartData = btoa(JSON.stringify(cart));
            const url = `${window.location.origin}${window.location.pathname}?cart=${cartData}`;
            navigator.clipboard.writeText(url).then(() => alert('Cart link copied!'));
        }
        
        function copyOrder() {
            const items = Object.entries(cart).map(([name, item]) => 
                `${name} x${item.quantity} - $${(item.quantity * item.price).toFixed(2)}`
            ).join('\n');
            const total = Object.values(cart).reduce((sum, item) => sum + (item.quantity * item.price), 0);
            navigator.clipboard.writeText(`My Poké Mart Order:\n${items}\n\nTotal: $${total.toFixed(2)}`)
                .then(() => alert('Order copied!'));
        }
        
        // Wishlist
        function saveWishlist() {
            // Implementation if needed
            alert('Wishlist feature coming soon!');
        }
        
        window.onload = init;
    </script>
</body>
</html>
